<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sitzplan</title>

<style>
body{
font-family:Arial;
padding:20px;
max-width:1100px;
margin:auto;
background:#f2f2f2;
}

h1{text-align:center;}

input,textarea{
width:100%;
font-size:16px;
margin-bottom:10px;
padding:6px;
}

textarea{height:140px;}

button{
padding:10px 14px;
margin:4px;
font-size:15px;
border-radius:8px;
border:none;
background:#3a7bd5;
color:white;
cursor:pointer;
}

.board{
text-align:center;
background:#333;
color:white;
padding:10px;
border-radius:6px;
margin-bottom:20px;
font-weight:bold;
}

.board.bottom{
margin-top:20px;
}

table{
width:100%;
border-collapse:separate;
border-spacing:4px;
table-layout:fixed;
}

td{
background:white;
border:2px solid #333;
border-radius:6px;
text-align:center;
vertical-align:middle;
height:60px;
font-weight:bold;
}

@page{
size:A4 landscape;
margin:10mm;
}

@media print{

textarea,button,input{display:none;}

td{
height:80px;
font-size:clamp(12px,2vw,22px);
}

}
</style>
</head>

<body>

<h1>Sitzplan</h1>

<input id="classname" placeholder="Klassenname (z.B. 5a)">
<textarea id="names" placeholder="Ein Name pro Zeile"></textarea>

<button onclick="generate()">Sitzplan erstellen</button>
<button onclick="toggleView()">Lehrer-/Schüleransicht</button>
<button onclick="window.print()">Drucken</button>
<button onclick="openServices()">Klassendienste</button>
<button onclick="saveClass()">Klasse speichern</button>
<button onclick="loadFile()">Klasse laden</button>

<input type="file" id="fileInput" style="display:none">

<div id="room"></div>

<script>
const cols=8
const rows=4
const total=32

let seats=[]
let mirrored=false
let rotation=[]
let lastServices={}
let stats={}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
;[a[i],a[j]]=[a[j],a[i]]
}
}

function generate(){
let names=document.getElementById("names").value
.split("\n")
.map(n=>n.trim())
.filter(n=>n!="")

shuffle(names)

seats=new Array(total).fill("")

for(let i=0;i<names.length;i++){
seats[i]=names[i]
}

draw()

localStorage.setItem("schuelerliste",names.join("\n"))
localStorage.setItem("classname",document.getElementById("classname").value)
}

function toggleView(){
mirrored=!mirrored
draw()
}

function draw(){
let room=document.getElementById("room")
room.innerHTML=""

if(!mirrored){
room.innerHTML+=`<div class="board">TAFEL</div>`
}

let table=document.createElement("table")

for(let r=0;r<rows;r++){
let tr=document.createElement("tr")
for(let c=0;c<cols;c++){
let i=r*cols+c
let index=mirrored ? total-1-i : i
let td=document.createElement("td")
td.textContent=seats[index]||""
tr.appendChild(td)
}
table.appendChild(tr)
}

room.appendChild(table)

if(mirrored){
room.innerHTML+=`<div class="board bottom">TAFEL</div>`
}
}

function openServices(){
localStorage.setItem("schuelerliste",document.getElementById("names").value)
localStorage.setItem("classname",document.getElementById("classname").value)
localStorage.setItem("rotation",JSON.stringify(rotation))
localStorage.setItem("stats",JSON.stringify(stats))
window.location.href="dienste.html"
}

function saveClass(){
let data={
klasse:document.getElementById("classname").value,
namen:document.getElementById("names").value,
rotation:rotation,
lastServices:lastServices,
stats:stats
}

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download=(document.getElementById("classname").value||"klasse")+".json"
a.click()
}

function loadFile(){
let input=document.getElementById("fileInput")
input.onchange=function(){
let file=input.files[0]
let reader=new FileReader()
reader.onload=function(e){
let data=JSON.parse(e.target.result)
document.getElementById("classname").value=data.klasse||""
document.getElementById("names").value=data.namen||""
rotation=data.rotation||[]
lastServices=data.lastServices||{}
stats=data.stats||{}
localStorage.setItem("schuelerliste",document.getElementById("names").value)
localStorage.setItem("classname",document.getElementById("classname").value)
}
reader.readAsText(file)
}
input.click()
}

window.onload=function(){
let saved=localStorage.getItem("schuelerliste")
let cname=localStorage.getItem("classname")
if(saved) document.getElementById("names").value=saved
if(cname) document.getElementById("classname").value=cname
}
</script>

</body>
</html>
